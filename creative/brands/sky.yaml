# ─────────────────────────────────────────────────
# 品牌 Profile 示例模板
# ─────────────────────────────────────────────────
# 这是品牌配置的示例文件，请参考此格式创建你自己的品牌配置。
# 复制此文件并重命名为你的品牌名称（如 mybrand.yaml），
# 然后替换下面所有示例内容为你的品牌信息。

name: "示例品牌 (Example Brand)"
company: 示例公司
category: 生活方式品牌
one_liner: 一个注重用户体验和美学设计的生活方式品牌

# ── 品牌原则 ──────────────────────────────────────
# 所有创意产出必须遵守的核心原则
principles:
  - name: 品质优先
    do: 展示产品的质感、细节、工艺
    dont: 夸大宣传、虚假承诺
  - name: 情感共鸣
    do: 先让人感受到品牌传递的生活态度
    dont: 功能罗列、参数展示
  - name: 真实自然
    do: 真实的使用场景、自然的表达方式
    dont: 过度修饰、刻意摆拍
  - name: 温暖邀请
    do: "来看看我们的世界"
    dont: "快下载！限时优惠！"
  - name: 用户视角
    do: 从用户体验出发讲故事
    dont: 自说自话、品牌自嗨

# ── 视觉词库 ──────────────────────────────────────
# 生成 prompt 时可以使用的视觉描述关键词
visual:
  colors:
    - 暖白色
    - 柔和米色
    - 自然木色
    - 淡雅绿
    - 天空蓝
    - 温柔粉
  lighting:
    - 自然光
    - 柔和漫射光
    - 晨间侧光
    - 金色暖光
    - 窗边光影
  textures:
    - 棉麻质感
    - 木纹肌理
    - 陶瓷釉面
    - 柔焦梦幻
    - 手绘风格
  moods:
    - 温馨舒适
    - 简约精致
    - 自然清新
    - 治愈系
    - 文艺感
    - 生活仪式感
  camera:
    - 缓慢推进
    - 特写细节
    - 从特写拉至全景
    - 固定机位长镜头
    - 俯拍桌面

# ── 场景/世界观 ──────────────────────────────────
# 品牌相关的典型场景和视觉环境
scenes:
  - name: 居家空间
    name_en: Home Space
    vibe: 温馨、舒适、日常
    keywords: cozy interior, warm light, home comfort
  - name: 咖啡馆
    name_en: Café Scene
    vibe: 文艺、社交、放松
    keywords: coffee shop, latte art, wooden table, afternoon light
  - name: 户外自然
    name_en: Outdoor Nature
    vibe: 清新、自由、探索
    keywords: green meadow, sunshine, breeze, wildflowers
  - name: 城市街角
    name_en: Urban Corner
    vibe: 都市、时尚、烟火气
    keywords: city street, shop front, pedestrian, golden hour

# ── 角色/主体描述 ────────────────────────────────
# 品牌内容中常见的角色或主体
characters:
  default: >
    25-35岁的都市年轻人，穿着简约有质感的服装，
    表情自然放松，传递出对生活品质的追求和热爱。
  variants:
    - name: 文艺青年
      look: 棉麻衬衫，帆布包，简约配饰
    - name: 职场白领
      look: 简约商务风，干练有品味
    - name: 户外爱好者
      look: 户外装备，自然放松的状态

# ── 视觉风格参考 ─────────────────────────────────
style_references:
  - 无印良品式的简约美学
  - 日系生活杂志的温暖色调
  - 北欧设计的功能与美感平衡

# ── 负面提示（AI 生成时要避免的） ──────────────────
negative_prompts:
  - 不要过度饱和的色彩
  - 不要暗黑/哥特色调
  - 不要科技感或未来感元素
  - 不要竞技/暴力/对抗画面
  - 不要过度修饰或浮夸造型
  - 不要荧光色或霓虹灯效果

# ── 文案调性（如需配文） ─────────────────────────
tone:
  principles:
    - name: 温度感
      desc: 像朋友聊天，不像品牌公告
    - name: 留白
      desc: 少即是多，留给读者想象空间
    - name: 画面感
      desc: 用文字创造场景感，让人身临其境
    - name: 共情
      desc: 从用户感受出发，而非品牌视角
  do:
    - 温暖、自然、邀请式
    - 用"你"而不是"用户"
    - 用画面感的语言
  dont:
    - 催促性语言（快、赶紧、限时）
    - 竞品对比（最好的、唯一的）
    - 过度承诺
    - 感叹号轰炸

# ── 目标平台偏好 ─────────────────────────────────
# 可选：品牌重点投放的平台
preferred_platforms:
  - 小红书
  - 抖音
  - B站
  - 微信
  - 微博
