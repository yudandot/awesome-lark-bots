# ─────────────────────────────────────────────────
# 平台运营指南模板
# ─────────────────────────────────────────────────
# 复制此文件，以平台 ID 命名（如 xiaohongshu.yaml），
# 填写各项内容。不确定的字段可以留空或删除。
#
# 推荐做法：把这个模板 + 平台最新规则发给 AI，让它帮你整理。

name: ""                    # 平台中文名

# ── 推荐算法要点 ──────────────────────────────────
algorithm:
  core_metric: ""           # 核心指标（如：完播率、互动率、搜索匹配）
  traffic_pools: ""         # 流量池机制描述
  cold_start: ""            # 冷启动逻辑
  boost_signals: []         # 加权信号
    # - 完播率 > 30%
    # - 评论区互动
  decay_signals: []         # 减权信号
    # - 硬广感过强
    # - 搬运内容

# ── 内容规范 ──────────────────────────────────────
content_specs:
  title_max_length: ""      # 标题字数限制
  body_max_length: ""       # 正文字数限制
  image_ratio: ""           # 推荐图片比例（如 3:4、1:1）
  video_duration: ""        # 推荐视频时长
  hashtag_count: ""         # 推荐话题标签数量
  cover_tips: ""            # 封面建议

# ── 最佳实践 ──────────────────────────────────────
best_practices: []
  # - 标题用数字+痛点，如"3步搞定xxx"
  # - 第一句话必须制造好奇心
  # - 发布时间：工作日 12:00-13:00 或 20:00-22:00

# ── 避免事项 ──────────────────────────────────────
avoid: []
  # - 直接放外链（限流）
  # - 提到竞品平台名
  # - 使用违禁词

# ── 爆款模式 ──────────────────────────────────────
# 该平台常见的爆款内容模式
viral_patterns: []
  # - name: "对比体"
  #   description: "before/after 强反差"
  # - name: "教程体"
  #   description: "分步骤教学，收藏率高"
