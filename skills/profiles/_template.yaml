# ─────────────────────────────────────────────────
# 个人 Profile 模板
# ─────────────────────────────────────────────────
# 复制此文件，重命名为你的名字（如 celeste.yaml），
# 填写各项内容。不确定的字段可以留空或删除。
#
# 也可以让 AI 帮你生成：把这个模板发给 ChatGPT / Claude，
# 让它根据你们过去的对话记录帮你填写。

name: ""                   # 你的名字/昵称
role: ""                   # 你的角色（如：产品经理、内容创作者、独立开发者）
one_liner: ""              # 一句话介绍自己

# ── 工作风格 ──────────────────────────────────────
work_style:
  decision_making: ""      # 决策风格（如：数据驱动、直觉型、先试再说）
  communication: ""        # 沟通偏好（如：简洁直接、喜欢类比、先说结论）
  pace: ""                 # 工作节奏（如：快速迭代、深思熟虑、80%先上再改）
  strengths: []            # 擅长什么
    # - 产品直觉
    # - 跨领域整合
  weaknesses: []           # 不太擅长/需要 AI 补位的
    # - 细节排版
    # - 数据分析

# ── 当前关注方向 ─────────────────────────────────
# AI 在构思和创作时会优先考虑这些方向
focus_areas:
  - topic: ""              # 方向名称
    why: ""                # 为什么关注
    stage: ""              # 当前阶段（探索中 / 执行中 / 已上线）
  # - topic: ""
  #   why: ""
  #   stage: ""

# ── 内容偏好 ──────────────────────────────────────
content_preferences:
  tone: []                 # 内容调性偏好
    # - 有洞察
    # - 不说废话
    # - 接地气但有格调
  avoid: []                # 不喜欢的内容风格
    # - 鸡汤体
    # - 过度营销感
    # - 标题党
  favorite_formats: []     # 偏爱的内容形式
    # - 短视频（15-30秒）
    # - 图文干货帖
    # - 深度长文
  target_platforms: []     # 主要发布平台
    # - 小红书
    # - 抖音
    # - B站

# ── 审美偏好 ──────────────────────────────────────
aesthetic:
  visual_style: []         # 视觉风格关键词
    # - 干净简约
    # - 高级感
    # - 自然光
  color_preference: ""     # 色彩倾向（如：低饱和、莫兰迪、高对比）
  references: []           # 审美参考（品牌/创作者/风格）
    # - Aesop 的视觉语言
    # - 某某博主的拍摄风格

# ── 知识背景 ──────────────────────────────────────
# 帮助 AI 理解你的知识储备，避免给你讲你已经懂的东西
knowledge:
  expert_in: []            # 精通领域
    # - 飞书生态
    # - AI 工具应用
  familiar_with: []        # 有了解
    # - 自媒体运营
    # - 品牌营销
  learning: []             # 正在学
    # - 视频剪辑
    # - 数据分析

# ── 协作规则 ──────────────────────────────────────
# 告诉 AI 你们怎么配合最高效
collaboration_rules:
  - ""
  # - 我说"做"就直接执行，不要问太多确认
  # - 给建议时先给结论再展开
  # - 如果我的想法有明显问题，直接指出
  # - 方案给我 2-3 个选项，不要只给一个
  # - 代码改动先说改了什么、影响范围，再贴代码
